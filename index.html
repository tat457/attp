<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3ゲーム 改良版</title>

<style>
body { margin:0; overflow:hidden; background:black; }

video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  transform: scaleX(-1);
}

canvas {
  position:absolute;
  top:0; left:0;
}

#ui {
  position:absolute;
  z-index:10;
  top:10px; left:10px;
}
button { padding:12px; margin:5px; font-size:16px; }
#info { color:white; font-size:18px; }
</style>
</head>

<body>

<div id="ui">
  <button onclick="startCamera()">▶ カメラ開始</button><br>
  <button onclick="startGame(1)">①拭き</button>
  <button onclick="startGame(2)">②足踏み</button>
  <button onclick="startGame(3)">③ジャンプ</button>
  <div id="info"></div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="game.js"></script>

</body>
</html>
