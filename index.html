<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3ゲーム（安定版）</title>

<style>
body { margin:0; overflow:hidden; background:black; }

video {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  transform: scaleX(-1); /* ★鏡 */
}

canvas {
  position:absolute;
  top:0; left:0;
}

#ui {
  position:absolute;
  z-index:10;
  top:10px; left:10px;
}
button { padding:10px; margin:5px; }
#info { color:white; }
</style>
</head>

<body>

<div id="ui">
<button onclick="startGame(1)">①拭き</button>
<button onclick="startGame(2)">②足踏み</button>
<button onclick="startGame(3)">③ジャンプ</button>
<div id="info"></div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<script>
const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")
const info = document.getElementById("info")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

navigator.mediaDevices.getUserMedia({video:true})
.then(s=>{
  video.srcObject=s
  init()
})

// ===== 状態 =====
let mode=0, count=0

// 足踏み・ジャンプ用状態
let footUp=false
let jumpUp=false

function startGame(m){
  mode=m
  count=0
  ctx.clearRect(0,0,canvas.width,canvas.height)

  if(m===1){
    ctx.fillStyle="rgba(120,120,120,0.7)"
    ctx.fillRect(0,0,canvas.width,canvas.height)
    info.textContent="拭き:0/100"
  }
  if(m===2){
    ctx.fillStyle="white"
    ctx.fillRect(0,0,canvas.width,canvas.height)
    info.textContent="足踏み:0/100"
  }
  if(m===3){
    info.textContent="ジャンプ:0/50"
  }
}

// ===== 拭き =====
function clean(x,y){
  ctx.globalCompositeOperation="destination-out"
  ctx.beginPath()
  ctx.arc(x,y,40,0,Math.PI*2)
  ctx.fill()
  ctx.globalCompositeOperation="source-over"
}

// ===== 初期化 =====
function init(){

const hands = new Hands({
  locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
})

hands.onResults(r=>{
  if(mode!==1) return
  if(!r.multiHandLandmarks) return

  count++
  info.textContent=`拭き:${count}/100`

  for(const lm of r.multiHandLandmarks){
    // ★鏡補正
    const x = (1-lm[8].x)*canvas.width
    const y = lm[8].y*canvas.height
    clean(x,y)
  }

  if(count>=100){
    ctx.clearRect(0,0,canvas.width,canvas.height)
    info.textContent="クリア！"
  }
})

const pose = new Pose({
  locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
})

pose.onResults(r=>{
  if(!r.poseLandmarks) return

  const foot = r.poseLandmarks[27]
  const hip = r.poseLandmarks[24]

  // ===== 足踏み（上下状態で判定）=====
  if(mode===2){
    if(foot.y < 0.6 && !footUp){
      footUp=true
    }
    if(foot.y > 0.7 && footUp){
      footUp=false
      count++
      info.textContent=`足踏み:${count}/100`

      const x=(1-foot.x)*canvas.width
      const y=foot.y*canvas.height
      ctx.fillStyle="gray"
      ctx.beginPath()
      ctx.arc(x,y,10,0,Math.PI*2)
      ctx.fill()
    }
  }

  // ===== ジャンプ =====
  if(mode===3){
    if(hip.y < 0.4 && !jumpUp){
      jumpUp=true
    }
    if(hip.y > 0.5 && jumpUp){
      jumpUp=false
      count++
      info.textContent=`ジャンプ:${count}/50`

      ctx.fillStyle="white"
      ctx.fillRect(0,canvas.height-count*5,canvas.width,5)
    }
  }
})

async function loop(){
  await hands.send({image:video})
  await pose.send({image:video})
  requestAnimationFrame(loop)
}
loop()

}
</script>

</body>
</html>
