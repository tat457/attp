<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ウォームアップゲーム3種</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <p class="eyebrow">Warm Up Games</p>
          <h1>動いて遊べる<br />3つの運動ゲーム</h1>
          <p class="lead">
            カメラで体の動きを検出して、窓ふき・足踏み・ジャンプをゲームにします。
          </p>
        </div>

        <section class="panel">
          <h2>ゲームを選ぶ</h2>
          <div class="game-buttons">
            <button class="game-button active" data-game="wipe">
              1. 窓ふき
              <span>手のひらを動かして窓をピカピカにする</span>
            </button>
            <button class="game-button" data-game="step">
              2. 足踏み
              <span>膝を上げて雪の上を足跡でいっぱいにする</span>
            </button>
            <button class="game-button" data-game="jump">
              3. ジャンプ
              <span>踵の動きで階段を登って頂上を目指す</span>
            </button>
          </div>
        </section>

        <section class="panel stats">
          <div>
            <p class="label">現在のゲーム</p>
            <p id="gameTitle" class="value">窓ふきゲーム</p>
          </div>
          <div>
            <p class="label">カウント</p>
            <p class="value"><span id="countValue">0</span> / 50</p>
          </div>
          <div>
            <p class="label">検出部位</p>
            <p id="trackingTarget" class="value">手のひら</p>
          </div>
          <div>
            <p class="label">状態</p>
            <p id="statusText" class="value">カメラを準備しています…</p>
          </div>
        </section>

        <section class="panel controls">
          <button id="startButton" class="primary-button">スタート</button>
          <button id="resetButton" class="secondary-button">このゲームをリセット</button>
          <p class="hint">
            動きが認識されにくい時は、全身または上半身がカメラに入る距離に調整してください。
          </p>
        </section>
      </aside>

      <main class="stage">
        <div class="canvas-wrap">
          <video id="inputVideo" playsinline></video>
          <audio id="bgmAudio" src="./fitnes.mp3" preload="auto" loop></audio>
          <canvas id="outputCanvas" width="960" height="720"></canvas>
          <div class="hud">
            <div class="progress-card">
              <span id="hudTitle">窓ふきゲーム</span>
              <strong id="hudCount">0 / 50</strong>
            </div>
            <div class="progress-track">
              <div id="progressBar" class="progress-fill"></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
